name: Respaldo diario de datos (Supabase)

on:
  schedule:
    - cron: '0 9 * * *'   # 09:00 UTC (~03:00 CDMX) todos los días
  workflow_dispatch:        # también se puede correr a mano desde la pestaña Actions

permissions:
  contents: write

concurrency:
  group: backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Snapshot de Supabase
        env:
          SB_URL: https://siwiluoxrjnqjnrufbjl.supabase.co
          SB_KEY: sb_publishable_eB75esPUCuPUkMyYD_df1A_uwhUVp9E
        run: python3 .github/scripts/snapshot.py

      - name: Commit si hubo cambios
        run: |
          if [ -n "$(git status --porcelain backups/)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add backups/
            git commit -m "Respaldo automático de datos ($(date -u +%F))"
            git push
            echo "Respaldo creado y subido."
          else
            echo "Sin cambios; no se crea respaldo."
          fi
