<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Gantt · Estrategia de Marketing — Grupo Innova</title>

<!--
  Gantt interactivo · Estrategia de Marketing Grupo Innova
  ------------------------------------------------------------------
  SUPUESTOS (editables todos dentro de la herramienta):
  - El único bloque con fechas duras en el documento es el Plan Maestro
    de 4 semanas (Open House Cluster Borgoña, 24-jun → 19-jul 2026).
  - Los Niveles 1–5 del Plan de Acción están priorizados por ROI, NO por
    fecha. Aquí se les asignó una ventana sugerida derivada de su prioridad
    (N1 inmediato, N2–N3 trimestres siguientes, etc.). Ajusta arrastrando.
  - "nuevo" marca las 7 ideas con mayor potencial del documento.
  Persistencia: localStorage. "Restablecer" vuelve al plan original.
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js" crossorigin></script>

<style>
  :root{
    --bg: oklch(0.975 0.0025 80);
    --surface: #ffffff;
    --surface-2: oklch(0.955 0.003 80);
    --surface-3: oklch(0.935 0.004 78);
    --ink: oklch(0.205 0.008 60);
    --ink-2: oklch(0.40 0.008 60);
    --ink-3: oklch(0.52 0.008 60);
    --line: oklch(0.905 0.003 80);
    --line-2: oklch(0.85 0.004 78);
    --accent: oklch(0.56 0.13 38);
    --accent-ink: oklch(0.47 0.12 38);
    --accent-wash: oklch(0.95 0.028 42);

    --n-sprint: #b85c3f;
    --n-1: #2f5d4a;
    --n-2: #2c5670;
    --n-3: #9a6f2e;
    --n-4: #7a3340;
    --n-5: #6f6a62;

    --leftW: 348px;
    --rowH: 50px;
    --barH: 24px;
    --headH: 60px;

    /* semantic z-scale */
    --z-grid: 0;
    --z-today: 1;
    --z-row: 2;
    --z-bar: 3;
    --z-left: 6;
    --z-head: 8;
    --z-corner: 10;
    --z-drawer: 40;
    --z-toast: 60;

    --ease: cubic-bezier(0.22, 1, 0.36, 1);
  }

  *{ box-sizing: border-box; }
  html,body{ margin:0; height:100%; }
  body{
    background: var(--bg);
    color: var(--ink);
    font-family: "Hanken Grotesk", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01";
  }
  body.dragging{ cursor: grabbing; user-select:none; }
  body.dragging *{ cursor: grabbing !important; }

  #root{ min-height:100%; }
  .wrap{ max-width: 1320px; margin: 0 auto; padding: 28px 28px 56px; }

  /* ---------- masthead ---------- */
  .mast{ display:flex; align-items:flex-end; justify-content:space-between; gap:24px; flex-wrap:wrap;
    padding-bottom:18px; border-bottom:1px solid var(--line-2); }
  .mast .id{ display:flex; flex-direction:column; gap:6px; }
  .wordmark{ font-family:"Fraunces", serif; font-weight:600; letter-spacing:-0.02em;
    font-size: 16.25px; text-transform:uppercase; color:var(--accent-ink); }
  .wordmark b{ letter-spacing:0.34em; }
  .mast h1{ font-family:"Fraunces", serif; font-weight:500; letter-spacing:-0.02em;
    font-size: clamp(2.125rem, 1.5rem + 2.25vw, 3.25rem); line-height:1.02; margin:0; text-wrap:balance; }
  .mast .sub{ color:var(--ink-2); font-size:17.5px; max-width:54ch; line-height:1.45; }
  .mast .meta{ text-align:right; color:var(--ink-3); font-family:"Spline Sans Mono", monospace;
    font-size:14.4px; line-height:1.7; letter-spacing:0.02em; }
  .mast .meta b{ color:var(--ink-2); font-weight:500; }

  /* ---------- kpi strip ---------- */
  .kpis{ display:flex; align-items:center; gap:0; flex-wrap:wrap; margin:18px 0 14px;
    border:1px solid var(--line); border-radius:14px; background:var(--surface); overflow:hidden; }
  .kpi{ padding:13px 20px; display:flex; flex-direction:column; gap:3px; flex:1 1 auto; min-width:120px;
    border-right:1px solid var(--line); }
  .kpi:last-child{ border-right:none; }
  .kpi .v{ font-family:"Fraunces",serif; font-weight:600; font-size:27.5px; letter-spacing:-0.01em;
    font-variant-numeric: tabular-nums; }
  .kpi .l{ font-size:13.75px; color:var(--ink-3); text-transform:uppercase; letter-spacing:0.07em; }
  .kpi.range .v{ font-size:18.75px; font-family:"Spline Sans Mono",monospace; font-weight:500; }
  .legend{ display:flex; gap:14px; padding:13px 20px; flex-wrap:wrap; align-items:center; }
  .legend .dot{ display:inline-flex; align-items:center; gap:7px; font-size:14.375px; color:var(--ink-2); }
  .legend .sw{ width:11px; height:11px; border-radius:3px; }

  /* ---------- toolbar ---------- */
  .toolbar{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:14px; }
  .search{ position:relative; flex:1 1 220px; min-width:180px; max-width:340px; }
  .search input{ width:100%; padding:9px 12px 9px 32px; border:1px solid var(--line-2); border-radius:9px;
    background:var(--surface); font:inherit; font-size:16.875px; color:var(--ink); }
  .search svg{ position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--ink-3); }
  .search input::placeholder{ color:var(--ink-3); }
  .search input:focus-visible{ outline:2px solid var(--accent); outline-offset:1px; border-color:transparent; }

  .seg{ display:inline-flex; border:1px solid var(--line-2); border-radius:9px; overflow:hidden; background:var(--surface); }
  .seg button{ border:none; background:transparent; font:inherit; font-size:16.25px; padding:8px 13px; cursor:pointer;
    color:var(--ink-2); border-right:1px solid var(--line); transition: background .15s var(--ease), color .15s var(--ease); }
  .seg button:last-child{ border-right:none; }
  .seg button[aria-pressed="true"]{ background:var(--ink); color:#fff; }
  .seg button:hover:not([aria-pressed="true"]){ background:var(--surface-2); }

  .label{ font-size:13.75px; color:var(--ink-3); text-transform:uppercase; letter-spacing:0.06em; margin:0 2px 0 6px; }

  .chip{ border:1px solid var(--line-2); background:var(--surface); border-radius:999px; padding:6px 12px;
    font:inherit; font-size:15.625px; cursor:pointer; color:var(--ink-2); display:inline-flex; align-items:center; gap:6px;
    transition: background .15s var(--ease), border-color .15s; }
  .chip .sw{ width:9px; height:9px; border-radius:50%; }
  .chip[aria-pressed="true"]{ background:var(--ink); color:#fff; border-color:var(--ink); }
  .chip:hover:not([aria-pressed="true"]){ background:var(--surface-2); }

  .btn{ border:1px solid var(--line-2); background:var(--surface); border-radius:9px; padding:8px 13px;
    font:inherit; font-size:16.25px; cursor:pointer; color:var(--ink); display:inline-flex; align-items:center; gap:6px;
    transition: background .15s var(--ease), border-color .15s, transform .06s; }
  .btn:hover{ background:var(--surface-2); }
  .btn:active{ transform:translateY(1px); }
  .btn.primary{ background:var(--accent); border-color:var(--accent); color:#fff; }
  .btn.primary:hover{ background:var(--accent-ink); }
  .btn.ghost{ border-color:transparent; background:transparent; color:var(--ink-3); }
  .btn.ghost:hover{ color:var(--ink); background:var(--surface-2); }
  .spacer{ flex:1 1 auto; }
  .syncpill{ display:inline-flex; align-items:center; gap:7px; font-size:13.75px; color:var(--ink-2);
    font-family:"Spline Sans Mono", monospace; padding:6px 11px; border:1px solid var(--line); border-radius:999px;
    background:var(--surface-2); white-space:nowrap; }
  .syncpill .sw{ width:8px; height:8px; border-radius:50%; }

  /* ---------- gantt ---------- */
  .gantt{ border:1px solid var(--line-2); border-radius:14px; background:var(--surface);
    overflow:auto; max-height: 64vh; position:relative; box-shadow: 0 1px 0 rgba(0,0,0,0.02); }
  .inner{ position:relative; }

  .head{ position:sticky; top:0; display:flex; z-index:var(--z-head); height:var(--headH); }
  .head .corner{ position:sticky; left:0; z-index:var(--z-corner); width:var(--leftW); flex:0 0 var(--leftW);
    background:var(--surface); border-right:1px solid var(--line-2); border-bottom:1px solid var(--line-2);
    display:flex; align-items:flex-end; padding:0 16px 9px; }
  .head .corner span{ font-size:13.75px; color:var(--ink-3); text-transform:uppercase; letter-spacing:0.08em; }
  .head .timehead{ position:relative; border-bottom:1px solid var(--line-2); background:var(--surface); }
  .month{ position:absolute; top:0; bottom:0; border-left:1px solid var(--line); display:flex; flex-direction:column;
    justify-content:flex-end; padding:0 0 8px 9px; }
  .month b{ font-family:"Spline Sans Mono",monospace; font-size:14.375px; font-weight:500; color:var(--ink-2);
    text-transform:uppercase; letter-spacing:0.04em; }
  .month i{ font-style:normal; font-size:12.5px; color:var(--ink-3); }
  .month.q::before{ content:""; }

  .grid{ position:absolute; top:0; bottom:0; z-index:var(--z-grid); pointer-events:none; }
  .gline{ position:absolute; top:0; bottom:0; width:1px; background:var(--line); }
  .gline.month{ background:var(--line-2); border:none; padding:0; }
  .gline.week{ background:var(--line); opacity:.55; }
  .todayline{ position:absolute; top:0; bottom:0; width:2px; background:var(--accent); z-index:var(--z-today); pointer-events:none; }
  .todaytag{ position:sticky; }

  .grp{ display:flex; align-items:stretch; background:var(--surface-2); }
  .grp .gl{ position:sticky; left:0; z-index:var(--z-left); width:var(--leftW); flex:0 0 var(--leftW);
    background:var(--surface-2); border-right:1px solid var(--line-2); border-bottom:1px solid var(--line);
    display:flex; align-items:center; gap:9px; padding:0 14px; height:46px; cursor:pointer; }
  .grp .caret{ transition: transform .18s var(--ease); color:var(--ink-3); display:flex; }
  .grp.collapsed .caret{ transform: rotate(-90deg); }
  .grp .gname{ font-family:"Fraunces",serif; font-weight:600; font-size:16.875px; letter-spacing:-0.01em; color:var(--ink);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .grp .gswatch{ width:10px; height:10px; border-radius:3px; flex:0 0 auto; }
  .grp .gcount{ font-size:13.75px; color:var(--ink-3); font-variant-numeric:tabular-nums; margin-left:auto;
    font-family:"Spline Sans Mono",monospace; }
  .grp .gt{ position:relative; border-bottom:1px solid var(--line); }
  .rollup{ position:absolute; top:50%; transform:translateY(-50%); height:6px; border-radius:3px; opacity:.55; }

  .row{ display:flex; align-items:stretch; }
  .row .rl{ position:sticky; left:0; z-index:var(--z-left); width:var(--leftW); flex:0 0 var(--leftW);
    background:var(--surface); border-right:1px solid var(--line-2); border-bottom:1px solid var(--line);
    display:flex; align-items:center; gap:9px; padding:0 14px 0 30px; height:var(--rowH); cursor:pointer; }
  .row:hover .rl{ background:var(--surface-2); }
  .row.sel .rl{ background:var(--accent-wash); }
  .rlc{ display:flex; flex-direction:column; gap:2px; min-width:0; flex:1 1 auto; }
  .rline1{ display:flex; align-items:center; gap:6px; min-width:0; }
  .rl .rname{ font-size:16.25px; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    flex:0 1 auto; min-width:0; }
  .sdot{ width:8px; height:8px; border-radius:50%; flex:0 0 auto; }
  .newtag{ font-size:10.625px; font-weight:700; letter-spacing:0.06em; color:#fff; background:var(--accent);
    border-radius:4px; padding:2px 5px; text-transform:uppercase; flex:0 0 auto; }
  .rl .rsub{ font-size:13.125px; color:var(--ink-3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  .row .rt{ position:relative; border-bottom:1px solid var(--line); }
  .row:hover .rt{ background: color-mix(in oklch, var(--surface-2) 55%, transparent); }
  .row.sel .rt{ background: color-mix(in oklch, var(--accent-wash) 50%, transparent); }

  .bar{ position:absolute; top:50%; transform:translateY(-50%); height:var(--barH);
    background: color-mix(in srgb, var(--c) 18%, white);
    border:1px solid color-mix(in srgb, var(--c) 46%, white);
    border-radius:7px; cursor:grab; overflow:hidden; min-width:8px;
    transition: box-shadow .15s var(--ease); }
  .bar:hover{ box-shadow: 0 4px 14px -4px color-mix(in srgb, var(--c) 60%, transparent); }
  .bar.sel{ outline:2px solid var(--c); outline-offset:1px; }
  .bar.review{ border-style:dashed; opacity:.72; }
  .bar .fill{ position:absolute; left:0; top:0; bottom:0; background:var(--c); opacity:.9; border-radius:6px 0 0 6px; }
  .bar .pct{ position:absolute; right:6px; top:50%; transform:translateY(-50%); font-size:12.5px;
    font-family:"Spline Sans Mono",monospace; color: color-mix(in srgb, var(--c) 78%, black); font-weight:500; }
  .bar .edge{ position:absolute; top:0; bottom:0; width:7px; cursor:ew-resize; z-index:2; }
  .bar .edge.l{ left:0; } .bar .edge.r{ right:0; }
  .bar .nu{ position:absolute; left:-1px; top:-1px; width:0; height:0;
    border-top:8px solid var(--accent); border-right:8px solid transparent; }

  .mile{ position:absolute; top:50%; width:16px; height:16px; transform:translate(-50%,-50%) rotate(45deg);
    background:var(--c); border:1px solid color-mix(in srgb,var(--c) 60%, black); cursor:grab; border-radius:3px; }
  .mile.sel{ outline:2px solid var(--c); outline-offset:2px; }
  .milelabel{ position:absolute; top:50%; transform:translateY(-50%); font-size:13.75px; color:var(--ink-2);
    white-space:nowrap; font-weight:600; }

  .empty{ padding:48px 24px; text-align:center; color:var(--ink-3); }
  .empty b{ display:block; font-family:"Fraunces",serif; color:var(--ink-2); font-size:20px; margin-bottom:4px; }

  .hint{ margin-top:12px; font-size:15px; color:var(--ink-3); display:flex; gap:18px; flex-wrap:wrap; align-items:center; }
  .hint kbd{ font-family:"Spline Sans Mono",monospace; font-size:13.75px; background:var(--surface-2);
    border:1px solid var(--line); border-radius:5px; padding:1px 6px; color:var(--ink-2); }

  /* ---------- drawer ---------- */
  .scrim{ position:fixed; inset:0; background:rgba(28,24,20,0.28); z-index:var(--z-drawer); opacity:0;
    animation: fade .2s var(--ease) forwards; }
  .drawer{ position:fixed; top:0; right:0; bottom:0; width:min(420px, 94vw); background:var(--surface);
    z-index:calc(var(--z-drawer) + 1); box-shadow:-18px 0 50px -24px rgba(0,0,0,0.4); display:flex; flex-direction:column;
    transform:translateX(100%); animation: slidein .28s var(--ease) forwards; }
  @keyframes fade{ to{ opacity:1; } }
  @keyframes slidein{ to{ transform:translateX(0); } }
  .drawer header{ padding:20px 22px 14px; border-bottom:1px solid var(--line); display:flex; align-items:flex-start; gap:12px; }
  .drawer header .dband{ width:5px; align-self:stretch; border-radius:3px; }
  .drawer header h3{ margin:0; font-family:"Fraunces",serif; font-weight:600; font-size:21.25px; letter-spacing:-0.01em; line-height:1.2; }
  .drawer header .x{ margin-left:auto; }
  .dbody{ overflow:auto; padding:18px 22px 26px; display:flex; flex-direction:column; gap:16px; }
  .field{ display:flex; flex-direction:column; gap:6px; }
  .field > label{ font-size:13.75px; color:var(--ink-3); text-transform:uppercase; letter-spacing:0.06em; }
  .field input, .field select, .field textarea{ font:inherit; font-size:16.875px; color:var(--ink);
    border:1px solid var(--line-2); border-radius:8px; padding:9px 10px; background:var(--surface); width:100%; }
  .field textarea{ resize:vertical; min-height:70px; line-height:1.5; }
  .field input:focus-visible, .field select:focus-visible, .field textarea:focus-visible{
    outline:2px solid var(--accent); outline-offset:1px; border-color:transparent; }
  .two{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .rangerow{ display:flex; align-items:center; gap:12px; }
  .rangerow input[type=range]{ flex:1; accent-color:var(--accent); }
  .rangerow .pv{ font-family:"Spline Sans Mono",monospace; font-size:16.25px; width:46px; text-align:right; color:var(--ink-2); }
  .dur{ font-size:15px; color:var(--ink-3); }
  .check{ display:flex; align-items:center; gap:9px; font-size:16.875px; color:var(--ink); cursor:pointer; }
  .check input{ width:16px; height:16px; accent-color:var(--accent); }
  .drawer footer{ margin-top:auto; padding:14px 22px; border-top:1px solid var(--line); display:flex; gap:10px; }
  .btn.danger{ color:#fff; background:#b3402f; border-color:#b3402f; }
  .btn.danger:hover{ background:#9a3526; }

  .toast{ position:fixed; bottom:22px; left:50%; transform:translateX(-50%); z-index:var(--z-toast);
    background:var(--ink); color:#fff; padding:10px 16px; border-radius:10px; font-size:16.25px;
    box-shadow:0 10px 30px -10px rgba(0,0,0,0.5); animation: fade .2s var(--ease); }

  /* ---------- login ---------- */
  .login{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .login-card{ width:min(420px, 100%); background:var(--surface); border:1px solid var(--line-2);
    border-radius:18px; padding:36px 34px; display:flex; flex-direction:column; gap:14px;
    box-shadow: 0 30px 80px -40px rgba(40,30,20,0.35); }
  .login-card .wordmark{ font-size:16.25px; }
  .login-card h1{ font-family:"Fraunces", serif; font-weight:500; letter-spacing:-0.02em;
    font-size: 2rem; line-height:1.05; margin:0; }
  .login-sub{ color:var(--ink-2); font-size:15px; line-height:1.45; margin:0 0 6px; }
  .login-field{ display:flex; flex-direction:column; gap:6px; }
  .login-field label{ font-size:12.5px; color:var(--ink-3); text-transform:uppercase; letter-spacing:0.06em; }
  .login-field input{ font:inherit; font-size:16px; color:var(--ink); border:1px solid var(--line-2);
    border-radius:9px; padding:11px 12px; background:var(--surface); width:100%; }
  .login-field input:focus-visible{ outline:2px solid var(--accent); outline-offset:1px; border-color:transparent; }
  .login-btn{ justify-content:center; margin-top:6px; padding:11px; font-size:16px; }
  .login-err{ color:#b3402f; font-size:14px; background:color-mix(in srgb,#b3402f 8%, white);
    border:1px solid color-mix(in srgb,#b3402f 30%, white); border-radius:8px; padding:8px 11px; }

  /* ---------- userbar / logout ---------- */
  .userbar{ display:inline-flex; align-items:center; gap:7px; color:var(--ink-2); }
  .userbar .udot{ width:8px; height:8px; border-radius:50%; background:#2f6d54; }
  .linkbtn{ border:none; background:none; font:inherit; font-size:inherit; color:var(--accent-ink);
    cursor:pointer; padding:0; text-decoration:underline; text-underline-offset:2px; }
  .linkbtn:hover{ color:var(--accent); }

  /* ---------- row delete ---------- */
  .rowdel{ flex:0 0 auto; opacity:0; border:none; background:none; cursor:pointer; color:var(--ink-3);
    display:flex; align-items:center; padding:4px; border-radius:6px; transition: opacity .12s var(--ease), background .12s, color .12s; }
  .row:hover .rowdel{ opacity:1; }
  .rowdel:hover{ color:#b3402f; background:color-mix(in srgb,#b3402f 12%, transparent); }
  .rowdel:focus-visible{ opacity:1; outline:2px solid var(--accent); outline-offset:1px; }

  /* ---------- footer actions / reset ---------- */
  .footer-actions{ margin-top:18px; padding-top:16px; border-top:1px solid var(--line);
    display:flex; justify-content:flex-end; }
  .btn.danger-ghost{ color:#b3402f; border-color:color-mix(in srgb,#b3402f 35%, white); background:transparent; }
  .btn.danger-ghost:hover{ background:color-mix(in srgb,#b3402f 8%, white); }

  /* ---------- modal (reset confirm) ---------- */
  .modal{ position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:calc(var(--z-drawer) + 1);
    width:min(460px, 94vw); background:var(--surface); border:1px solid var(--line-2); border-radius:16px;
    padding:26px 26px 22px; box-shadow:0 40px 90px -40px rgba(0,0,0,0.45); display:flex; flex-direction:column; gap:12px;
    animation: pop .2s var(--ease); }
  @keyframes pop{ from{ opacity:0; transform:translate(-50%,-46%); } to{ opacity:1; transform:translate(-50%,-50%); } }
  .modal h3{ margin:0; font-family:"Fraunces",serif; font-weight:600; font-size:21px; letter-spacing:-0.01em; }
  .modal p{ margin:0; color:var(--ink-2); font-size:15px; line-height:1.5; }
  .modal .modal-hint{ color:var(--ink); }
  .modal input{ font:inherit; font-size:16px; letter-spacing:0.12em; text-transform:uppercase;
    border:1px solid var(--line-2); border-radius:9px; padding:11px 12px; background:var(--surface); }
  .modal input:focus-visible{ outline:2px solid var(--accent); outline-offset:1px; border-color:transparent; }

const sha256hex = async (str) => {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, "0")).join("");
};

function Login({ onLogin }){
  const [user, setUser] = useState("");
  const [pass, setPass] = useState("");
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);
  const submit = async (e)=>{
    e.preventDefault(); setErr(""); setBusy(true);
    const u = user.trim().toLowerCase();
    const expected = USERS[u];
    let ok = false;
    if(expected){ try { ok = (await sha256hex(pass)) === expected; } catch(_){ ok = false; } }
    setBusy(false);
    if(ok) onLogin(u); else setErr("Usuario o contraseña incorrectos.");
  };
  return (
    <div className="login">
      <form className="login-card" onSubmit={submit}>
        <div className="wordmark">Grupo <b>Innova</b></div>
        <h1>Estrategia de Marketing</h1>

  );
}

function ResetModal({ onClose, onConfirm }){
  const [txt, setTxt] = useState("");
  const ok = txt.trim().toUpperCase() === "RESTABLECER";
  useEffect(()=>{
    const onKey = (e)=>{ if(e.key === "Escape") onClose(); };
    window.addEventListener("keydown", onKey);
    return ()=> window.removeEventListener("keydown", onKey);
  }, [onClose]);
  return (
    <React.Fragment>
      <div className="scrim" onClick={onClose} />
      <div className="modal" role="dialog" aria-label="Restablecer plan">
        <h3>Restablecer el plan</h3>
        <p>Esto reemplaza <b>todas las acciones</b> por el plan original y sobrescribe lo guardado en Supabase. No se puede deshacer.</p>
        <p className="modal-hint">Para confirmar, escribe <b>RESTABLECER</b>:</p>
        <input value={txt} onChange={e=>setTxt(e.target.value)} placeholder="RESTABLECER" autoFocus

        <div className="modal-actions">
          <button className="btn ghost" onClick={onClose}>Cancelar</button>

  );
}

  const _local = loadLocal();
  const [tasks, setTasks] = useState(() => (_local && _local.tasks) || SEED);
  const [groupBy, setGroupBy] = useState((_local && _local.config && _local.config.groupBy) || "nivel");
  const [zoom, setZoom] = useState((_local && _local.config && _local.config.zoom) || "mes");
  const [query, setQuery] = useState("");
  const [statusF, setStatusF] = useState(()=> new Set());
  const [onlyNew, setOnlyNew] = useState(false);
  const [collapsed, setCollapsed] = useState(()=> new Set());
  const [selId, setSelId] = useState(null);
  const [toast, setToast] = useState(null);
  const [resetOpen, setResetOpen] = useState(false);
  const [sync, setSync] = useState(sb ? "connecting" : "local"); // connecting|synced|saving|error|local
  const hydrated = useRef(false);

  /* hidratar desde Supabase al abrir (si no hay fila, sube el estado actual) */
  useEffect(()=>{
    let cancelled = false;
    if(!sb){ hydrated.current = true; return; }
    (async ()=>{
      const res = await loadRemote();
      if(cancelled) return;
      if(res.ok && res.data && Array.isArray(res.data.tasks)){
        setTasks(res.data.tasks);
        if(res.data.config){
          if(res.data.config.groupBy) setGroupBy(res.data.config.groupBy);
          if(res.data.config.zoom) setZoom(res.data.config.zoom);
        }
        setSync("synced");
      } else if(res.ok && !res.data){
        const up = await saveRemote({ tasks, config:{ groupBy, zoom } });
        setSync(up.ok ? "synced" : "error");
      } else {
        console.warn("Supabase no disponible:", res.error);
        setSync("error");
      }
      hydrated.current = true;
    })();
    return ()=>{ cancelled = true; };
  }, []);

  /* guardar: siempre a local; a Supabase (con debounce) tras la hidratación */
  useEffect(()=>{
    const state = { tasks, config:{ groupBy, zoom } };
    saveLocal(state);
    if(!sb || !hydrated.current) return;
    let cancelled = false;
    setSync(s => s === "error" ? "saving" : (s === "synced" ? "saving" : s));
    const h = setTimeout(async ()=>{
      const up = await saveRemote(state);
      if(!cancelled) setSync(up.ok ? "synced" : "error");
    }, 600);
    return ()=>{ cancelled = true; clearTimeout(h); };
  }, [tasks, groupBy, zoom]);

  useEffect(()=>{
    const onKey = (e)=>{ if(e.key === "Escape") setSelId(null); };
    window.addEventListener("keydown", onKey);
    return ()=> window.removeEventListener("keydown", onKey);
  },[]);
  const flash = (m)=>{ setToast(m); setTimeout(()=> setToast(null), 1900); };

  const ppd = PX[zoom];

  /* domain from ALL tasks so the axis is stable */
  const domain = useMemo(()=>{
    let min = Infinity, max = -Infinity;
    tasks.forEach(tk => { min = Math.min(min, parse(tk.start)); max = Math.max(max, parse(tk.end)); });
    if(!isFinite(min)){ min = todayMs(); max = min + 30*MS; }
    const s = new Date(min), e = new Date(max);
    const start = Date.UTC(s.getUTCFullYear(), s.getUTCMonth(), 1);
    const end = Date.UTC(e.getUTCFullYear(), e.getUTCMonth()+1, 0); // last day of month
    return { start, end, days: diffDays(start,end)+1 };
  }, [tasks]);

  const width = domain.days * ppd;
  const x = useCallback((ms)=> diffDays(domain.start, ms) * ppd, [domain.start, ppd]);

  /* months + weeks for header / grid */
  const months = useMemo(()=>{
    const out = []; let y = new Date(domain.start).getUTCFullYear(), m = new Date(domain.start).getUTCMonth();
    let cur = Date.UTC(y, m, 1);
    while(cur <= domain.end){
      const next = Date.UTC(y, m+1, 1);
      const days = diffDays(cur, Math.min(next - MS, domain.end)) + 1;
      out.push({ ms: cur, days, label: MES_ABBR[m], year: y });
      m++; if(m>11){ m=0; y++; } cur = Date.UTC(y, m, 1);
    }
    return out;
  }, [domain.start, domain.end]);

  const weeks = useMemo(()=>{
    if(ppd < 24) return [];
    const out = []; let cur = domain.start;
    // align to Monday
    const dow = new Date(cur).getUTCDay(); const shift = (dow === 0 ? 1 : (8 - dow)) % 7;
    cur += shift * MS;
    while(cur <= domain.end){ out.push(cur); cur += 7*MS; }
    return out;
  }, [domain.start, domain.end, ppd]);

  /* filtering */
  const norm = (s)=> (s||"").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"");
  const q = norm(query);
  const visible = useMemo(()=> tasks.filter(tk => {
    if(onlyNew && !tk.nuevo) return false;
    if(statusF.size && !statusF.has(tk.status)) return false;
    if(q && !(norm(tk.name).includes(q) || norm(tk.detail).includes(q) || norm(tk.owner).includes(q))) return false;
    return true;
  }), [tasks, onlyNew, statusF, q]);

  /* groups */
  const groups = useMemo(()=>{
    const keys = groupBy === "nivel" ? NIVEL_ORDER : CANAL_ORDER;
    return keys.map(k => {
      const items = visible.filter(tk => (groupBy==="nivel" ? tk.nivel : tk.canal) === k)
        .sort((a,b)=> parse(a.start) - parse(b.start));
      if(!items.length) return null;
      let min = Infinity, max = -Infinity;
      items.forEach(tk => { min = Math.min(min, parse(tk.start)); max = Math.max(max, parse(tk.end)); });
      const color = groupBy === "nivel" ? NIVELES[k].hex : CANALES[k].hex;
      const label = groupBy === "nivel" ? NIVELES[k].label : k;
      return { key:k, label, color, items, min, max };
    }).filter(Boolean);
  }, [visible, groupBy]);

  /* KPIs (over ALL tasks) */
  const kpi = useMemo(()=>{
    const total = tasks.length;
    const nuevas = tasks.filter(tk=>tk.nuevo).length;
    const revisar = tasks.filter(tk=>tk.status==="review").length;
    let wsum=0, wden=0;
    tasks.forEach(tk=>{ if(tk.status==="review") return; const d = diffDays(parse(tk.start),parse(tk.end))+1;
      wsum += tk.progress * d; wden += d; });
    const avance = wden ? Math.round(wsum/wden) : 0;
    return { total, nuevas, revisar, avance };
  }, [tasks]);

  /* ------- drag ------- */
  const drag = useRef(null);
  const moved = useRef(false);
  const onMove = useCallback((e)=>{
    const d = drag.current; if(!d) return;
    const dd = Math.round((e.clientX - d.startX) / d.ppd);
    if(dd !== 0) moved.current = true;
    setTasks(ts => ts.map(tk => {
      if(tk.id !== d.id) return tk;
      if(d.mode === "move") return { ...tk, start: toISO(d.s + dd*MS), end: toISO(d.e + dd*MS) };
      if(d.mode === "l"){ const ns = Math.min(d.s + dd*MS, d.e); return { ...tk, start: toISO(ns) }; }
      if(d.mode === "r"){ const ne = Math.max(d.e + dd*MS, d.s); return { ...tk, end: toISO(ne) }; }
      return tk;
    }));
  }, []);
  const endDrag = useCallback(()=>{
    drag.current = null;
    window.removeEventListener("pointermove", onMove);
    window.removeEventListener("pointerup", endDrag);
    document.body.classList.remove("dragging");
  }, [onMove]);
  const startDrag = (e, task, mode)=>{
    if(e.button != null && e.button !== 0) return;
    e.preventDefault(); e.stopPropagation();
    moved.current = false;
    drag.current = { id:task.id, mode, startX:e.clientX, s:parse(task.start), e:parse(task.end), ppd };
    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", endDrag);
    document.body.classList.add("dragging");
  };
  const clickBar = (id)=>{ if(moved.current){ moved.current = false; return; } setSelId(id); };

  /* ------- mutations ------- */
  const patch = (next)=> setTasks(ts => ts.map(tk => tk.id === next.id ? next : tk));
  const del = (id)=>{ setTasks(ts => ts.filter(tk=>tk.id!==id)); setSelId(null); flash("Acción eliminada"); };
  const addTask = ()=>{
    const start = todayMs(); const id = "u" + Date.now().toString(36);
    const nt = t(id, "Nueva acción", "", groupBy==="nivel" ? "1" : "1", "Eventos",
      toISO(start), toISO(start + 7*MS), { owner:"Dirección MKT" });
    if(groupBy === "canal") nt.canal = "Eventos";
    setTasks(ts => [...ts, nt]); setSelId(id);
  };
  const toggleStatus = (s)=> setStatusF(prev => { const n = new Set(prev); n.has(s) ? n.delete(s) : n.add(s); return n; });
  const toggleGroup = (k)=> setCollapsed(prev => { const n = new Set(prev); n.has(k) ? n.delete(k) : n.add(k); return n; });
  const doReset = ()=>{ setTasks(SEED); setSelId(null); setResetOpen(false); flash("Plan restablecido"); };

  /* ------- export ------- */
  const download = (name, text, type)=>{
    const blob = new Blob([text], { type }); const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = name; a.click();
    setTimeout(()=> URL.revokeObjectURL(url), 500);
  };
  const exportCSV = ()=>{
    const head = ["id","accion","nivel","canal","inicio","fin","dias","avance","responsable","estatus","idea_nueva"];
    const esc = (v)=>{ const s = String(v ?? ""); return /[",\n;]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s; };
    const rows = tasks.map(tk => [tk.id, tk.name, NIVELES[tk.nivel]?.label||tk.nivel, tk.canal, tk.start, tk.end,
      diffDays(parse(tk.start),parse(tk.end))+1, tk.progress+"%", tk.owner, STATUS[tk.status]?.label||tk.status, tk.nuevo?"sí":"no"].map(esc).join(","));
    download("gantt-innova.csv", [head.join(","), ...rows].join("\n"), "text/csv;charset=utf-8");
    flash("CSV exportado");
  };
  const exportJSON = ()=>{ download("gantt-innova.json", JSON.stringify(tasks, null, 2), "application/json"); flash("JSON exportado"); };

  const sel = tasks.find(tk => tk.id === selId) || null;
  const tToday = todayMs();
  const showToday = tToday >= domain.start && tToday <= domain.end;

  const statusList = ["todo","doing","done","review","risk"];

  return (
    <div className="wrap">
      <div className="mast">
        <div className="id">
          <div className="wordmark">Grupo <b>Innova</b></div>
          <h1>Estrategia de Marketing</h1>
          <div className="sub">Roadmap maestro 2026 — Gantt interactivo. Arrastra para reprogramar, edita cada acción y exporta tu plan.</div>
        </div>
        <div className="meta">
          <span className="userbar"><span className="udot"/>{DISPLAY[authUser] || authUser} · <button className="linkbtn" onClick={onLogout}>Salir</button></span><br/>
          León, Guanajuato<br/>
          <b>Plan de acción priorizado por ROI</b>
        </div>
      </div>

      <div className="kpis">
        <div className="kpi"><span className="v">{kpi.total}</span><span className="l">Acciones</span></div>
        <div className="kpi"><span className="v">{kpi.nuevas}</span><span className="l">Ideas nuevas</span></div>
        <div className="kpi"><span className="v">{kpi.avance}%</span><span className="l">Avance ponderado</span></div>
        <div className="kpi"><span className="v">{kpi.revisar}</span><span className="l">A revisar</span></div>
        <div className="kpi range"><span className="v">{`${fmtShort(domain.start)} '${String(new Date(domain.start).getUTCFullYear()).slice(2)} – ${fmtShort(domain.end)} '${String(new Date(domain.end).getUTCFullYear()).slice(2)}`}</span><span className="l">Horizonte</span></div>
        <div className="legend">
          {(groupBy==="nivel" ? NIVEL_ORDER.map(k=>({l:NIVELES[k].label.split(" · ")[0], c:NIVELES[k].hex}))
            : CANAL_ORDER.map(c=>({l:c, c:CANALES[c].hex}))).map(it=>(
            <span className="dot" key={it.l}><span className="sw" style={{background:it.c}}/>{it.l}</span>
          ))}
        </div>
      </div>

      <div className="toolbar">
        <div className="search">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="Buscar acción, responsable…" />
        </div>
        <span className="label">Agrupar</span>
        <Seg value={groupBy} onChange={setGroupBy} options={[{v:"nivel",l:"Nivel ROI"},{v:"canal",l:"Canal"}]} />
        <span className="label">Zoom</span>
        <Seg value={zoom} onChange={setZoom} options={[{v:"trimestre",l:"Trim."},{v:"mes",l:"Mes"},{v:"semana",l:"Sem."}]} />
        <button className="chip" aria-pressed={onlyNew} onClick={()=>setOnlyNew(v=>!v)}>
          <span className="sw" style={{background:"var(--accent)"}}/> Solo ideas nuevas
        </button>
        <div className="spacer" />
        <span className="syncpill" title="Estado de sincronización con Supabase">
          <span className="sw" style={{background:(SYNC_UI[sync]||SYNC_UI.local).hex}}/>
          {(SYNC_UI[sync]||SYNC_UI.local).label}
        </span>
        <button className="btn primary" onClick={addTask}>+ Acción</button>
        <button className="btn" onClick={exportCSV}>CSV</button>
        <button className="btn" onClick={exportJSON}>JSON</button>
      </div>

      <div className="toolbar" style={{marginTop:"-4px"}}>
        <span className="label">Estatus</span>
        {statusList.map(s=>(
          <button key={s} className="chip" aria-pressed={statusF.has(s)} onClick={()=>toggleStatus(s)}>
            <span className="sw" style={{background:STATUS[s].hex}}/> {STATUS[s].label}
          </button>
        ))}
        {statusF.size>0 && <button className="btn ghost" onClick={()=>setStatusF(new Set())}>Limpiar</button>}
      </div>

      <div className="gantt">
        <div className="inner" style={{ width: `calc(var(--leftW) + ${width}px)` }}>
          {/* gridlines + today behind everything */}
          <div className="grid" style={{ left:"var(--leftW)", width: width }}>
            {months.map((m,i)=> i>0 && <div key={"m"+i} className="gline month" style={{ left: x(m.ms) }} />)}
            {weeks.map((w,i)=> <div key={"w"+i} className="gline week" style={{ left: x(w) }} />)}
            {showToday && <div className="todayline" style={{ left: x(tToday) }} />}
          </div>

          {/* header */}
          <div className="head">
            <div className="corner"><span>Acción</span></div>
            <div className="timehead" style={{ width: width }}>
              {months.map((m,i)=>(
                <div className="month" key={i} style={{ left: x(m.ms), width: m.days*ppd }}>
                  <b>{m.label}</b><i>{`'${String(m.year).slice(2)}`}</i>
                </div>
              ))}
            </div>
          </div>

          {/* groups + rows */}
          {groups.length === 0 && (
            <div className="empty"><b>Sin resultados</b>Ajusta la búsqueda o los filtros para ver acciones.</div>
          )}
          {groups.map(g => {
            const isCol = collapsed.has(g.key);
            return (
              <React.Fragment key={g.key}>
                <div className={"grp" + (isCol ? " collapsed" : "")}>
                  <div className="gl" onClick={()=>toggleGroup(g.key)}>
                    <span className="caret"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4"><path d="m6 9 6 6 6-6"/></svg></span>
                    <span className="gswatch" style={{ background:g.color }} />
                    <span className="gname">{g.label}</span>
                    <span className="gcount">{g.items.length}</span>
                  </div>
                  <div className="gt" style={{ width: width }}>
                    <div className="rollup" style={{ left: x(g.min), width: Math.max((diffDays(g.min,g.max)+1)*ppd, 6), background:g.color }} />
                  </div>
                </div>
                {!isCol && g.items.map(tk => {
                  const c = colorOf(tk, groupBy);
                  const s = parse(tk.start), e = parse(tk.end);
                  const left = x(s);
                  const w = Math.max((diffDays(s,e)+1)*ppd, 10);
                  const isSel = tk.id === selId;
                  const otherDim = groupBy === "nivel" ? tk.canal : ("N" + tk.nivel === "Nsprint" ? "Sprint" : "Nivel "+tk.nivel);
                  return (
                    <div className={"row" + (isSel ? " sel" : "")} key={tk.id}>
                      <div className="rl" title={tk.detail} onClick={()=>setSelId(tk.id)}>
                        <span className="sdot" style={{ background: STATUS[tk.status].hex }} title={STATUS[tk.status].label} />
                        <div className="rlc">
                          <div className="rline1">
                            <span className="rname">{tk.name}</span>
                            {tk.nuevo && <span className="newtag">Nuevo</span>}
                          </div>
                          <span className="rsub">{tk.owner} · {STATUS[tk.status].label}</span>
                        </div>
                        <button className="rowdel" title="Quitar acción" aria-label={"Quitar " + tk.name}
                          onClick={(e)=>{ e.stopPropagation(); if(confirm("¿Quitar «" + tk.name + "»?")) del(tk.id); }}>
                          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
                        </button>
                      </div>
                      <div className="rt" style={{ width: width }}>
                        {tk.milestone ? (
                          <React.Fragment>
                            <div className={"mile" + (isSel?" sel":"")} style={{ left, "--c": c }}
                              title={`${tk.name} · ${fmtLong(s)}`}
                              onPointerDown={(e)=>startDrag(e, tk, "move")} onClick={()=>clickBar(tk.id)} />
                            <span className="milelabel" style={{ left: left + 14 }}>{tk.name}</span>
                          </React.Fragment>
                        ) : (
                          <div className={"bar" + (isSel?" sel":"") + (tk.status==="review"?" review":"")}
                            style={{ left, width: w, "--c": c }}
                            title={`${tk.name}\n${fmtShort(s)} – ${fmtShort(e)} · ${diffDays(s,e)+1} días\n${tk.owner} · ${STATUS[tk.status].label} · ${tk.progress}%`}
                            onPointerDown={(e)=>startDrag(e, tk, "move")} onClick={()=>clickBar(tk.id)}>
                            <div className="fill" style={{ width: tk.progress + "%" }} />
                            {tk.nuevo && <span className="nu" />}
                            {w > 46 && <span className="pct">{tk.progress}%</span>}
                            <span className="edge l" onPointerDown={(e)=>startDrag(e, tk, "l")} />
                            <span className="edge r" onPointerDown={(e)=>startDrag(e, tk, "r")} />
                          </div>
                        )}
                      </div>
                    </div>
                  );
                })}
              </React.Fragment>
            );
          })}
        </div>
      </div>

      <div className="hint">
        <span><kbd>Arrastra</kbd> el centro de una barra para reprogramar · <kbd>bordes</kbd> para cambiar duración</span>
        <span><kbd>Clic</kbd> abre el editor · pasa el cursor sobre una fila para <kbd>quitarla</kbd> · <kbd>Esc</kbd> cierra</span>
        <span>Cambios guardados automáticamente (Supabase + respaldo local)</span>
      </div>

      <div className="footer-actions">
        <button className="btn danger-ghost" onClick={()=>setResetOpen(true)}>Restablecer plan original</button>
      </div>

      <Drawer task={sel} onChange={patch} onClose={()=>setSelId(null)} onDelete={del} />
      {resetOpen && <ResetModal onClose={()=>setResetOpen(false)} onConfirm={doReset} />}
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

function Root(){
  const [authUser, setAuthUser] = useState(()=>{
    try { const u = localStorage.getItem(AUTH_KEY); return (u && USERS[u]) ? u : null; } catch(e){ return null; }
  });
  if(!authUser) return <Login onLogin={(u)=>{ try{ localStorage.setItem(AUTH_KEY, u); }catch(e){} setAuthUser(u); }} />;
  return <App authUser={authUser} onLogout={()=>{ try{ localStorage.removeItem(AUTH_KEY); }catch(e){} setAuthUser(null); }} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
</body>
</html>
